# docker-compose.yml
services:
  # PostgreSQL with TimescaleDB pre-installed
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: analytics-timescaledb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Ayesha
      POSTGRES_DB: analytics_studio
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d analytics_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics-network
    restart: unless-stopped

  # Redis for real-time cache
  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics-network
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: analytics-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@analytics.com
      PGADMIN_DEFAULT_PASSWORD: Ayesha
    ports:
      - "5050:80"
    depends_on:
      - timescaledb
    networks:
      - analytics-network
    restart: unless-stopped

networks:
  analytics-network:
    driver: bridge

volumes:
  timescale_data:
  redis_data: